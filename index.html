  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1117;
      color: #E6EDF3;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: #00E5FF; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    hr {
      border: none;
      border-top: 1px solid #30363D;
      margin: 36px 0;
    }

    .header {
      display: flex;

      align-items: flex-start;
      flex-wrap: wrap;
    }

    .header img.photo {

      height: 147px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #30363D;
      flex-shrink: 0;
    }

    .header-info h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .header-info .meta { color: #8B949E; font-size: 13px; margin-bottom: 14px; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag {
      background: #161B22;
      border: 1px solid #30363D;
      color: #8B949E;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .supervisor { font-size: 13px; color: #8B949E; }
    .supervisor span { color: #E6EDF3; }

    .section-title {
      font-size: 11px;

      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8B949E;

    }

    .poster img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #30363D;
      display: block;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .link-item {
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .link-item a { font-size: 13px; font-weight: 600; }
    .link-item .link-desc { font-size: 11px; color: #8B949E; }
    .link-item.disabled a { color: #8B949E; pointer-events: none; }

    .tech-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tech-item {
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      color: #E6EDF3;
    }

    .footer {
      font-size: 12px;
      color: #8B949E;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
